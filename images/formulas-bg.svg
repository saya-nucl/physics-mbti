<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%">
  <!-- スタイル定義（チョーク風のぼかしとフォント） -->
  <style>
    .chalk-text {
      font-family: 'JetBrains Mono', 'Times New Roman', Times, serif;
      fill: rgba(240, 240, 245, 0.08);
      font-style: italic;
    }
    .chalk-line {
      stroke: rgba(240, 240, 245, 0.06);
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .chalk-grid {
      stroke: rgba(240, 240, 245, 0.02);
      stroke-width: 1;
      fill: none;
    }
  </style>

  <!-- 薄い方眼（黒板の補助線） -->
  <path class="chalk-grid" d="M 0,90 L 1920,90 M 0,180 L 1920,180 M 0,270 L 1920,270 M 0,360 L 1920,360 M 0,450 L 1920,450 M 0,540 L 1920,540 M 0,630 L 1920,630 M 0,720 L 1920,720 M 0,810 L 1920,810 M 0,900 L 1920,900 M 0,990 L 1920,990" />
  <path class="chalk-grid" d="M 120,0 L 120,1080 M 240,0 L 240,1080 M 360,0 L 360,1080 M 480,0 L 480,1080 M 600,0 L 600,1080 M 720,0 L 720,1080 M 840,0 L 840,1080 M 960,0 L 960,1080 M 1080,0 L 1080,1080 M 1200,0 L 1200,1080 M 1320,0 L 1320,1080 M 1440,0 L 1440,1080 M 1560,0 L 1560,1080 M 1680,0 L 1680,1080 M 1800,0 L 1800,1080" />

  <!-- ==================== 数式セクション ==================== -->
  
  <!-- 左上: シュレーディンガー方程式 -->
  <text x="80" y="120" class="chalk-text" font-size="28" transform="rotate(-2, 80, 120)">iℏ ∂/∂t Ψ(r,t) = Ĥ Ψ(r,t)</text>
  <text x="80" y="160" class="chalk-text" font-size="20" transform="rotate(-2, 80, 160)">Ĥ = -ℏ²/2m ∇² + V(r)</text>
  
  <!-- 左下: アインシュタイン場の方程式 ＆ E=mc² -->
  <text x="100" y="850" class="chalk-text" font-size="28" transform="rotate(3, 100, 850)">R_μν - 1/2 R g_μν + Λ g_μν = (8πG/c⁴) T_μν</text>
  <text x="100" y="910" class="chalk-text" font-size="34" font-weight="bold" transform="rotate(1, 100, 910)">E = mc²</text>
  
  <!-- 右上: マクスウェル方程式 -->
  <text x="1450" y="100" class="chalk-text" font-size="22" transform="rotate(1, 1450, 100)">∇ · E = ρ / ε₀</text>
  <text x="1450" y="135" class="chalk-text" font-size="22" transform="rotate(1, 1450, 135)">∇ · B = 0</text>
  <text x="1450" y="170" class="chalk-text" font-size="22" transform="rotate(1, 1450, 170)">∇ × E = -∂B/∂t</text>
  <text x="1450" y="205" class="chalk-text" font-size="22" transform="rotate(1, 1450, 205)">∇ × B = μ₀J + μ₀ε₀ ∂E/∂t</text>

  <!-- 右下: エントロピー ＆ 不確定性原理 -->
  <text x="1500" y="880" class="chalk-text" font-size="32" transform="rotate(-3, 1500, 880)">S = k_B ln W</text>
  <text x="1500" y="930" class="chalk-text" font-size="26" transform="rotate(-1, 1500, 930)">Δx · Δp ≥ ℏ/2</text>

  <!-- 中央上: ディラック方程式 -->
  <text x="800" y="90" class="chalk-text" font-size="24" transform="rotate(-1, 800, 90)">(iγ^μ ∂_μ - m) ψ = 0</text>

  <!-- 中央下: パスの積分 (ファインマン) -->
  <text x="750" y="990" class="chalk-text" font-size="24" transform="rotate(2, 750, 990)">K(b,a) = ∫ e^(i/ℏ S[x(t)]) Dx(t)</text>

  <!-- 左中: ニュートン力学 ＆ ローレンツ力 -->
  <text x="50" y="480" class="chalk-text" font-size="24" transform="rotate(-5, 50, 480)">F = d/dt (mv) = m a</text>
  <text x="50" y="520" class="chalk-text" font-size="22" transform="rotate(-5, 50, 520)">F = q(E + v × B)</text>

  <!-- 右中: プランクの関係式 ＆ ド・ブロイ波長 -->
  <text x="1600" y="500" class="chalk-text" font-size="26" transform="rotate(4, 1600, 500)">E = hν = ℏω</text>
  <text x="1600" y="540" class="chalk-text" font-size="24" transform="rotate(4, 1600, 540)">λ = h / p</text>


  <!-- ==================== 図形・図表セクション ==================== -->

  <!-- 左上: ポテンシャルの谷と波動関数 -->
  <path class="chalk-line" d="M 120,240 L 120,340 L 320,340 L 320,240" />
  <path class="chalk-line" stroke-dasharray="4,4" d="M 120,290 L 320,290" />
  <path class="chalk-line" stroke="rgba(0, 242, 254, 0.15)" stroke-width="2" d="M 120,290 Q 170,230 220,290 T 320,290" />
  <text x="230" y="275" class="chalk-text" font-size="16">ψ₁(x)</text>
  <text x="130" y="330" class="chalk-text" font-size="14">V(x) = 0</text>

  <!-- 右上: ファインマン・ダイアグラム -->
  <!-- 電子(e-)と陽電子(e+)の衝突、光子(γ)の放出 -->
  <path class="chalk-line" d="M 1400,280 L 1480,330" />
  <path class="chalk-line" d="M 1400,380 L 1480,330" />
  <!-- 光子の波線 -->
  <path class="chalk-line" stroke="rgba(255, 51, 102, 0.15)" stroke-width="2" d="M 1480,330 Q 1500,320 1520,330 T 1560,330 T 1600,330" />
  <path class="chalk-line" d="M 1600,330 L 1680,280" />
  <path class="chalk-line" d="M 1600,330 L 1680,380" />
  <text x="1380" y="275" class="chalk-text" font-size="16">e⁻</text>
  <text x="1380" y="395" class="chalk-text" font-size="16">e⁺</text>
  <text x="1530" y="315" class="chalk-text" font-size="16">γ</text>
  <text x="1695" y="275" class="chalk-text" font-size="16">μ⁻</text>
  <text x="1695" y="395" class="chalk-text" font-size="16">μ⁺</text>

  <!-- 左下: 結晶格子 (物性物理) -->
  <circle cx="150" cy="650" r="6" fill="rgba(240, 240, 245, 0.08)" />
  <circle cx="230" cy="650" r="6" fill="rgba(240, 240, 245, 0.08)" />
  <circle cx="310" cy="650" r="6" fill="rgba(240, 240, 245, 0.08)" />
  <circle cx="190" cy="710" r="6" fill="rgba(240, 240, 245, 0.08)" />
  <circle cx="270" cy="710" r="6" fill="rgba(240, 240, 245, 0.08)" />
  <circle cx="150" cy="770" r="6" fill="rgba(240, 240, 245, 0.08)" />
  <circle cx="230" cy="770" r="6" fill="rgba(240, 240, 245, 0.08)" />
  <circle cx="310" cy="770" r="6" fill="rgba(240, 240, 245, 0.08)" />
  <!-- 格子間の結合線 -->
  <line x1="150" y1="650" x2="230" y2="650" class="chalk-line" />
  <line x1="230" y1="650" x2="310" y2="650" class="chalk-line" />
  <line x1="150" y1="650" x2="190" y2="710" class="chalk-line" />
  <line x1="230" y1="650" x2="190" y2="710" class="chalk-line" />
  <line x1="230" y1="650" x2="270" y2="710" class="chalk-line" />
  <line x1="310" y1="650" x2="270" y2="710" class="chalk-line" />
  <line x1="190" y1="710" x2="270" y2="710" class="chalk-line" />
  <line x1="190" y1="710" x2="150" y2="770" class="chalk-line" />
  <line x1="190" y1="710" x2="230" y2="770" class="chalk-line" />
  <line x1="270" y1="710" x2="230" y2="770" class="chalk-line" />
  <line x1="270" y1="710" x2="310" y2="770" class="chalk-line" />
  <line x1="150" y1="770" x2="230" y2="770" class="chalk-line" />
  <line x1="230" y1="770" x2="310" y2="770" class="chalk-line" />
  <text x="210" y="630" class="chalk-text" font-size="14">lattice a</text>

  <!-- 右下: 重力による時空の歪み（3Dグリッド風） -->
  <path class="chalk-line" stroke="rgba(255, 215, 0, 0.08)" d="M 1400,650 Q 1550,750 1550,750 T 1700,650" />
  <path class="chalk-line" stroke="rgba(255, 215, 0, 0.08)" d="M 1420,680 Q 1550,760 1550,760 T 1680,680" />
  <path class="chalk-line" stroke="rgba(255, 215, 0, 0.08)" d="M 1450,710 Q 1550,770 1550,770 T 1650,710" />
  <circle cx="1550" cy="740" r="16" fill="none" class="chalk-line" stroke-width="2" />
  <circle cx="1550" cy="740" r="6" fill="rgba(240, 240, 245, 0.08)" />
  <text x="1575" y="735" class="chalk-text" font-size="16">Mass M</text>
</svg>
